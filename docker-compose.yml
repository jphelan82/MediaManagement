version: "3.8"
services:
  mediamanagement:
    build: .
    container_name: mediamanagement
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - ./config/default.yaml:/app/config/default.yaml:ro
      - media_data:/app/data
    environment:
      - TZ=America/New_York
      - NODE_ENV=production
      - LOG_LEVEL=info

volumes:
  media_data:
